<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Student Grade Manager</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <h2 class="text-center mb-4">🎓 Student Grade Manager System</h2>
      <div class="card shadow p-4 mb-4">
        <h5>Add Student</h5>
        <form method="POST">
          <input type="hidden" name="action" value="add" />
          <div class="row">
            <div class="col-md-5">
              <input
                type="text"
                name="name"
                class="form-control"
                placeholder="Student Name"
                required
              />
            </div>
            <div class="col-md-5">
              <input
                type="number"
                name="marks"
                class="form-control"
                placeholder="Marks (0-100)"
                min="0"
                max="100"
                required
              />
            </div>
            <div class="col-md-2">
              <button class="btn btn-primary w-100">Add</button>
            </div>
          </div>
        </form>
      </div>

      <div class="card shadow p-4 mb-4">
        <h5>Search Student</h5>
        <form method="GET">
          <div class="row">
            <div class="col-md-8">
              <input
                type="text"
                name="search"
                class="form-control"
                placeholder="Enter name to search"
              />
            </div>
            <div class="col-md-2">
              <button class="btn btn-secondary w-100">Search</button>
            </div>
            <div class="col-md-2">
              <a href="/" class="btn btn-success w-100">View All</a>
            </div>
          </div>
        </form>
      </div>

      <div class="card shadow p-4">
        <h5>Student List</h5>

        {% if students %}
        <table class="table table-bordered table-striped mt-3">
          <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Marks</th>
              <th>Grade</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            {% for s in students %}
            <tr>
              <td>{{ s.id }}</td>
              <td>{{ s.name }}</td>
              <td>{{ s.marks }}</td>
              <td>{{ s.grade }}</td>
              <td>
                <form method="POST" style="display: inline">
                  <input type="hidden" name="action" value="delete" />
                  <input type="hidden" name="id" value="{{ s.id }}" />
                  <button class="btn btn-danger btn-sm">Delete</button>
                </form>
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
        {% else %}
        <p class="text-muted mt-3">No students found.</p>
        {% endif %}
      </div>
    </div>
  </body>
</html>
